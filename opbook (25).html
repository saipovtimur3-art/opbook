<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Операционная книга · VKO</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  html, body { margin:0; padding:0; background:#0c0d0f; }
  body{ padding: 18px; min-height:100vh; }
  :root{
    --ink:#14171A;
    --ink-2:#1D2126;
    --paper:#E9EBE6;
    --paper-2:#F5F6F2;
    --amber:#F2B705;
    --bh:#E2472B;
    --bh-2:#F5B700;
    --mobar:#8A5A34;
    --mobar-2:#3C2A1E;
    --red-alert:#C1272D;
    --line: rgba(255,255,255,0.09);
    --text-dim: rgba(245,244,240,0.55);
    --ok:#3FA34D;
    --wip:#F2B705;
    --todo: rgba(245,244,240,0.28);
    font-family: 'IBM Plex Sans', -apple-system, sans-serif;
  }
  * { box-sizing: border-box; }
  #opbook-root{
    background: var(--ink);
    color:#F5F4F0;
    min-height: 100%;
    display:flex;
    border-radius: 14px;
    overflow:hidden;
    box-shadow: 0 30px 60px -20px rgba(0,0,0,0.5);
    min-height: 640px;
  }
  .ob-mono{ font-family:'IBM Plex Mono', 'Courier New', monospace; letter-spacing: 0.02em; }
  .ob-display{ font-family:'Archivo Black', 'Arial Black', sans-serif; }

  /* ---------- SIDEBAR ---------- */
  .ob-side{
    width: 268px;
    flex-shrink:0;
    background: var(--ink-2);
    border-right: 1px solid var(--line);
    display:flex;
    flex-direction:column;
  }
  .ob-side-head{
    padding: 20px 18px 16px;
    border-bottom: 1px solid var(--line);
  }
  .ob-eyebrow{ font-size:10px; letter-spacing:0.18em; color:var(--amber); text-transform:uppercase; margin-bottom:6px;}
  .ob-title{ font-size:18px; line-height:1.15; margin:0 0 8px; }
  .ob-progress-row{ display:flex; align-items:center; gap:8px; font-size:11px; color:var(--text-dim);}
  .ob-progress-track{ flex:1; height:4px; background:rgba(255,255,255,0.1); border-radius:2px; overflow:hidden;}
  .ob-progress-fill{ height:100%; background:var(--amber); transition:width .5s ease; }

  .ob-point-toggle{ display:flex; gap:6px; margin-top:12px; }
  .ob-point-btn{
    flex:1; font-size:11px; padding:8px 6px; border-radius:7px; border:1px solid var(--line);
    background:rgba(255,255,255,0.03); color:var(--text-dim); cursor:pointer; text-align:center;
    font-family:'IBM Plex Sans',sans-serif; font-weight:600; transition:all .15s ease;
  }
  .ob-point-btn.active.bh{ background:var(--bh); color:#fff; border-color:var(--bh); }
  .ob-point-btn.active.mobar{ background:var(--mobar); color:#fff; border-color:var(--mobar); }

  .ob-nav-group-label{ padding:12px 18px 4px; font-size:10px; letter-spacing:0.12em; text-transform:uppercase; color:var(--text-dim); }

  .ob-stories{ display:flex; gap:10px; padding:2px 18px 14px; overflow-x:auto; }
  .ob-story-avatar{ flex-shrink:0; width:64px; text-align:center; cursor:pointer; background:none; border:none; color:#F5F4F0; padding:0; }
  .ob-story-ring{ width:64px; height:48px; border-radius:6px; overflow:hidden; margin:0 auto 4px; border:1px solid var(--line); position:relative; }
  .ob-story-ring img{ width:100%; height:100%; object-fit:cover; display:block; }
  .ob-story-ring::after{ content:'📷'; position:absolute; bottom:2px; right:3px; font-size:9px; opacity:0.85; }
  .ob-story-label{ font-size:9.5px; color:var(--text-dim); line-height:1.2; }

  .ob-story-overlay{
    position:fixed; inset:0; background:rgba(10,10,10,0.86); z-index:9999;
    display:flex; align-items:center; justify-content:center; padding:24px;
  }
  .ob-story-frame{ position:relative; width:100%; max-width:480px; background:var(--ink-2); border-radius:14px; overflow:hidden; border:1px solid var(--line); box-shadow:0 20px 50px rgba(0,0,0,0.5); }
  .ob-story-frame img{ width:100%; max-height:60vh; object-fit:contain; display:block; background:#000; }
  .ob-story-close{ position:absolute; top:10px; right:10px; z-index:2; background:rgba(0,0,0,0.5); color:#fff; border:none; width:28px; height:28px; border-radius:50%; font-size:15px; cursor:pointer; }
  .ob-story-caption{ padding:14px 18px; color:#F5F4F0; font-size:13px; line-height:1.5; }
  .ob-story-nav{ display:flex; align-items:center; justify-content:space-between; padding:0 14px 14px; }
  .ob-story-navbtn{ background:rgba(255,255,255,0.08); border:1px solid var(--line); color:#F5F4F0; width:34px; height:34px; border-radius:50%; cursor:pointer; font-size:15px; }
  .ob-story-navbtn:disabled{ opacity:0.25; cursor:default; }
  .ob-story-dots{ display:flex; gap:5px; }
  .ob-story-dot{ width:5px; height:5px; border-radius:50%; background:rgba(255,255,255,0.25); }
  .ob-story-dot.active{ background:var(--amber); }

  .ob-menu-cover{ width:100%; height:150px; object-fit:cover; border-radius:10px; margin-bottom:12px; display:block; }

  .ob-nav{ flex:1; overflow-y:auto; padding: 8px 0; }
  .ob-nav-item{
    width:100%; display:flex; align-items:center; gap:10px;
    padding:10px 18px; background:none; border:none; cursor:pointer;
    color:#F5F4F0; text-align:left; border-left:3px solid transparent;
    font-size:13px;
  }
  .ob-nav-item:hover{ background:rgba(255,255,255,0.04); }
  .ob-nav-item.active{ background:rgba(255,255,255,0.06); border-left-color: var(--amber); }
  .ob-nav-code{ font-size:11px; color:var(--text-dim); width:20px; flex-shrink:0; }
  .ob-nav-icon{ width:18px; text-align:center; flex-shrink:0; }
  .ob-nav-name{ flex:1; }
  .ob-dot{ width:7px; height:7px; border-radius:50%; flex-shrink:0; background:var(--todo); }
  .ob-dot.ok{ background:var(--ok); }
  .ob-dot.wip{ background:var(--wip); }

  .ob-side-foot{ padding:12px 18px; border-top:1px solid var(--line); font-size:10px; color:var(--text-dim); }

  /* ---------- MAIN ---------- */
  .ob-main{ flex:1; background:var(--paper); color:var(--ink); display:flex; flex-direction:column; min-width:0; }
  .ob-board{
    background: var(--ink);
    color:#fff;
    padding: 16px 28px;
    display:flex; align-items:center; gap:16px;
    border-bottom: 3px solid var(--amber);
  }
  .ob-flap{
    font-size: 30px; font-weight:900; letter-spacing:0.05em;
    background: var(--ink-2); border:1px solid var(--line); border-radius:4px;
    padding: 2px 10px; min-width:56px; text-align:center;
  }
  .ob-flap span{ display:inline-block; }
  .ob-board-title{ font-size:13px; letter-spacing:0.14em; text-transform:uppercase; color:var(--text-dim);}
  .ob-board-name{ font-size:19px; margin-top:2px; }

  .ob-content{ padding: 26px 30px 40px; overflow-y:auto; }
  .ob-content-head{ display:flex; justify-content:space-between; align-items:flex-start; gap:16px; margin-bottom:20px; flex-wrap:wrap;}
  .ob-status-chip{
    font-size:11px; padding:5px 10px; border-radius:20px; border:1px solid transparent;
    cursor:pointer; user-select:none; font-family:'IBM Plex Mono',monospace;
  }
  .ob-status-chip.todo{ background:rgba(0,0,0,0.06); color:#555; border-color:rgba(0,0,0,0.12); }
  .ob-status-chip.wip{ background:#FFF3CC; color:#8a6900; border-color:#f0d675; }
  .ob-status-chip.ok{ background:#DFF3E2; color:#1f6b30; border-color:#a9dcb3; }

  .ob-section-desc{ font-size:13px; color:#555; max-width:560px; margin:0; }

  .ob-card{
    background: var(--paper-2); border:1px solid rgba(0,0,0,0.08); border-radius:10px;
    padding:16px 18px; margin-bottom:12px;
  }
  .ob-card-title{ font-size:11px; text-transform:uppercase; letter-spacing:0.1em; color:#8a8a80; margin:0 0 10px;}

  .ob-check-row{ display:flex; align-items:center; gap:10px; padding:9px 0; border-bottom:1px solid rgba(0,0,0,0.06); font-size:14px;}
  .ob-check-row:last-child{ border-bottom:none;}
  .ob-check-row input{ width:17px; height:17px; accent-color: var(--bh); flex-shrink:0; }
  .ob-check-row.done label{ text-decoration:line-through; color:#999; }

  .ob-grid{ display:grid; grid-template-columns: repeat(auto-fill, minmax(190px,1fr)); gap:12px; }
  .ob-contact{ background:var(--paper-2); border:1px solid rgba(0,0,0,0.08); border-radius:10px; padding:14px; }
  .ob-contact-role{ font-size:10px; text-transform:uppercase; letter-spacing:.08em; color:#8a8a80; }
  .ob-contact-name{ font-size:15px; font-weight:600; margin:3px 0 2px; }
  .ob-contact-phone{ font-size:13px; color:#555; }

  .ob-stat-row{ display:flex; gap:12px; flex-wrap:wrap; margin-bottom:14px;}
  .ob-stat{ background:var(--paper-2); border:1px solid rgba(0,0,0,0.08); border-radius:10px; padding:14px 16px; min-width:130px;}
  .ob-stat-val{ font-size:24px; font-weight:800; }
  .ob-stat-label{ font-size:11px; color:#8a8a80; text-transform:uppercase; letter-spacing:.06em;}

  .ob-alert{ background:#FBEAEA; border:1px solid #E7B9BA; border-left:4px solid var(--red-alert); border-radius:8px; padding:14px 16px; margin-bottom:10px;}
  .ob-alert-title{ color:var(--red-alert); font-weight:700; font-size:13px; margin:0 0 4px;}

  .accent-bh .ob-flap, .accent-bh .ob-board{ border-bottom-color: var(--bh-2); }
  .accent-bh .ob-status-chip.ok{ background:#FFE3D6; color:#a13a17; border-color:#f0b79b; }
  .accent-mobar .ob-board{ border-bottom-color: var(--mobar); }

  @media (max-width: 720px){
    #opbook-root{ flex-direction:column; border-radius:0; min-height:100vh; }
    .ob-side{ width:100%; flex-direction:row; align-items:center; }
    .ob-side-head{ display:none; }
    .ob-nav{ display:flex; overflow-x:auto; padding:10px; gap:4px; }
    .ob-nav-item{ flex-direction:column; width:auto; border-left:none; border-bottom:3px solid transparent; padding:8px 12px; gap:4px; white-space:nowrap;}
    .ob-nav-item.active{ border-bottom-color:var(--amber); border-left-color:transparent;}
    .ob-nav-name{ font-size:11px; }
    .ob-nav-code{ display:none; }
    .ob-side-foot{ display:none; }
    .ob-board{ padding:12px 16px; }
    .ob-flap{ font-size:22px; min-width:42px; padding:2px 6px;}
    .ob-content{ padding:18px 16px 30px; }
  }
</style>
</head>
<body>

<div id="opbook-root">
  <aside class="ob-side">
    <div class="ob-side-head">
      <div class="ob-eyebrow">VKO · Терминал A</div>
      <h1 class="ob-title ob-display">ОПЕРАЦИОННАЯ<br/>КНИГА</h1>
      <div class="ob-progress-row">
        <span id="ob-progress-text">0/5</span>
        <div class="ob-progress-track"><div class="ob-progress-fill" id="ob-progress-fill" style="width:0%"></div></div>
      </div>
      <div class="ob-point-toggle">
        <button class="ob-point-btn bh" id="ob-point-bh">🍔 Burger Heroes</button>
        <button class="ob-point-btn mobar" id="ob-point-mobar">🍹 Мо Бар</button>
      </div>
    </div>
    <div class="ob-stories" id="ob-stories"></div>
    <div id="ob-story-overlay"></div>
    <nav class="ob-nav" id="ob-nav"></nav>
    <div class="ob-side-foot">Burger Heroes · Mo Bar<br/>обновлено вручную · v0.1 демо</div>
  </aside>

  <main class="ob-main" id="ob-main">
    <div class="ob-board">
      <div class="ob-flap ob-mono" id="ob-flap">01</div>
      <div>
        <div class="ob-board-title" id="ob-board-title">Раздел</div>
        <div class="ob-board-name ob-display" id="ob-board-name">—</div>
      </div>
    </div>
    <div class="ob-content" id="ob-content"></div>
  </main>
</div>

<script>
(function(){
const MOBAR_PHOTOS_DATA = [
  { src:'https://lh3.googleusercontent.com/d/1AO39gZtltBnoCQZAmgDDinXX_kmJ4_lU', caption:'Зона отдыха у гейта 29 — рядом со стойкой Мо Бар, с видом на перрон.' },
  { src:'https://lh3.googleusercontent.com/d/1VasT3pyFYQir6ftFJU_atp6_WE0QSXUL', caption:'Стойка Мо Бар — быстрые закуски и напитки в дорогу.' },
  { src:'https://lh3.googleusercontent.com/d/1jusXt0esk8TX50UcjxZ5WEhYsw2lh0bm', caption:'Витрина с напитками и снэками у кассы.' },
];
  const MOBAR_PHOTOS = MOBAR_PHOTOS_DATA;
const BH_PHOTOS = [
  { src:'https://lh3.googleusercontent.com/d/1ZpkWA5mjuIiby_cGFbJb-qzzbQVWdQ5M', caption:'Стойка Burger Heroes у гейтов 25–26 — фирменная жёлто-чёрная вывеска встречает пассажиров МВЛ.' },
  { src:'https://lh3.googleusercontent.com/d/14nwPjugISYCSR0tP5a1WoYV4HshS7v6l', caption:'Барная стойка с живым баром Red Finch и большим табло меню.' },
];

  const SECTIONS = [
    { id:"checklists", code:"01", icon:"📋", name:"Чек-листы смены", accent:"point", group:"point",
      desc:"Чек-листы по ролям: кухня, менеджер, повар, касса, мойка — по точке.",
      render: renderChecklist },
    { id:"menu", code:"02", icon:"🍔", name:"Меню и барная карта", accent:"point",
      desc:"Актуальное меню и стоп-лист — по точке.",
      render: renderMenu, group:"point" },
    { id:"finance", code:"03", icon:"💰", name:"Финансы", accent:"point",
      desc:"Выручка за месяц, средний СПП, пассажиропоток, средний чек, % выполнения плана — по точке.",
      render: renderFinance, group:"point" },
    { id:"team", code:"04", icon:"🧑‍🍳", name:"Состав команды", accent:"point",
      desc:"Полный список сотрудников точки: ФИО, должность, телефон, статус оформления.",
      render: renderTeam, group:"point" },
    { id:"ushr", code:"05", icon:"📐", name:"Штатное расписание (УШР)", accent:"point",
      desc:"Плановый штат, график, ставки — по точке.",
      render: renderUSHR, group:"point" },
    { id:"appearance", code:"06", icon:"👗", name:"Внешний вид", accent:"point",
      desc:"Стандарт формы и внешнего вида сотрудников — по точке.",
      render: renderAppearance, group:"point" },
    { id:"staff", code:"07", icon:"👥", name:"Руководство", accent:"", group:"common",
      desc:"Контакты руководства и структуры управления.",
      render: renderStaff },
    { id:"suppliers", code:"08", icon:"🚚", name:"Поставщики", accent:"", group:"common",
      desc:"Контакты поставщиков по категориям, отсрочка, дни отгрузки.",
      render: renderSuppliers },
    { id:"contacts", code:"09", icon:"📞", name:"Технические службы", accent:"", group:"common",
      desc:"Контакты сервисных служб — общие для обеих точек.",
      render: renderTechContacts },
    { id:"emergency", code:"10", icon:"🚨", name:"ЧС", accent:"", group:"common",
      desc:"Нештатные ситуации, экстренные контакты.",
      render: renderEmergency },
    { id:"airport_rules", code:"11", icon:"🛫", name:"Правила аэропорта", accent:"", group:"common",
      desc:"Что нужно знать на смене о сбойных ситуациях в Внуково (регламент РГ-02.06-12).",
      render: renderAirportRules },
    { id:"manager", code:"12", icon:"👔", name:"Управляющий", accent:"accent-mobar", group:"common",
      desc:"Ежедневный, еженедельный и ежемесячный чек-лист управляющего.",
      render: renderManagerTasks },
    { id:"motivation", code:"13", icon:"🏆", name:"Мотивация", accent:"", group:"common",
      desc:"KPI, конкурсы, премии.",
      render: renderMotivation },
    { id:"training", code:"14", icon:"📚", name:"Обучение", accent:"", group:"common",
      desc:"План стажировки нового сотрудника.",
      render: renderTraining },
    { id:"access", code:"15", icon:"🔐", name:"Доступы", accent:"", group:"common",
      desc:"Ключи и доступы к системам — конфиденциально.",
      render: renderAccess },
    { id:"sheets", code:"16", icon:"📁", name:"Все таблицы", accent:"", group:"common",
      desc:"Все Google-таблицы, которые нужны управляющему, в одном месте.",
      render: renderSheetsHub },
  ];

  let currentPoint = 'bh'; // 'bh' | 'mobar'
  const POINT_LABEL = { bh:'🍔 Burger Heroes', mobar:'🍹 Мо Бар' };

  // ---- Live Google Sheets revenue source (JSONP — sidesteps CORS entirely) ----
  const REVENUE_SHEET_ID = '1wwb1fkPp7ZUhtksrsBaKHJBOOufshtooHCnolrAZY1o';
  const REVENUE_SHEET_NAMES = { bh:'БХ ИЮЛЬ 2026', mobar:'МО БАР ИЮЛЬ 2026' };
  const financeCache = {}; // point -> { ... }

  function fetchSheetJSONP(sheetId, sheetName){
    return new Promise((resolve, reject)=>{
      const cbName = 'obCb_' + Math.random().toString(36).slice(2,10);
      const url = 'https://docs.google.com/spreadsheets/d/' + sheetId +
        '/gviz/tq?tqx=out:json;responseHandler:' + cbName + '&sheet=' + encodeURIComponent(sheetName) + '&headers=0&_=' + Date.now();
      let settled = false;
      const script = document.createElement('script');
      const cleanup = ()=>{ try{ window[cbName] = undefined; delete window[cbName]; }catch(e){} if(script.parentNode) script.parentNode.removeChild(script); };
      window[cbName] = function(json){
        if(settled) return; settled = true;
        cleanup();
        resolve(json);
      };
      script.src = url;
      script.onerror = function(){
        if(settled) return; settled = true;
        cleanup();
        reject(new Error('Скрипт не загрузился — проверь, что таблица доступна по ссылке'));
      };
      document.body.appendChild(script);
      setTimeout(()=>{
        if(settled) return; settled = true;
        cleanup();
        reject(new Error('Таймаут запроса (8с) — Google не ответил'));
      }, 8000);
    });
  }

  function cleanCell(s){
    return s.replace(/[\u200B-\u200F\u202A-\u202E\u2066-\u2069\uFEFF]/g, '').trim();
  }

  function jsonToRows(json){
    if(!json || !json.table || !json.table.rows) throw new Error('Пустой ответ от Google Sheets');
    return json.table.rows.map(r => (r.c||[]).map(cell=>{
      if(!cell) return '';
      if(cell.f !== undefined && cell.f !== null) return cleanCell(String(cell.f));
      if(cell.v !== undefined && cell.v !== null) return cleanCell(String(cell.v));
      return '';
    }));
  }

  function findCol(headerRow, keywords){
    for(let i=0;i<headerRow.length;i++){
      const h = (headerRow[i]||'').toLowerCase();
      if(keywords.every(k=>h.includes(k))) return i;
    }
    return -1;
  }

  function parseNum(v){
    if(v===undefined || v===null) return NaN;
    const cleaned = String(v).replace(/\s/g,'').replace(',', '.').replace(/[^\d.\-]/g,'');
    if(cleaned==='') return NaN;
    return Number(cleaned);
  }

  function escapeHtml(s){
    return String(s).replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
  }

  function fmtNum(n, decimals){
    if(n===null || n===undefined || isNaN(n)) return '—';
    return n.toLocaleString('ru-RU', { maximumFractionDigits: decimals!==undefined?decimals:0, minimumFractionDigits:0 });
  }

  function avg(arr){
    const vals = arr.filter(v=>!isNaN(v));
    if(!vals.length) return null;
    return vals.reduce((a,b)=>a+b,0)/vals.length;
  }

  async function loadFinanceData(point){
    const sheetName = REVENUE_SHEET_NAMES[point];
    const json = await fetchSheetJSONP(REVENUE_SHEET_ID, sheetName);
    if(json.status === 'error'){
      const msg = (json.errors && json.errors[0] && (json.errors[0].detailed_message || json.errors[0].message)) || 'Google Sheets вернул ошибку';
      throw new Error(msg);
    }
    const rows = jsonToRows(json);

    // Подтверждено на реальных данных: дневная строка = 15 колонок в фиксированном порядке
    // 0:№ 1:Дата 2:День 3:Выручка 4:Чеки 5:Ср.чек 6:План1(руб) 7:План2(руб) 8:СПП 9:✓П1 10:✓П2 11:Паспоток 12:%конв 13:ДоПлана1 14:ДоПлана2
    const COL = { date:1, revenue:3, checks:4, avgCheck:5, plan1Rev:6, spp:8, passengers:11 };
    const dateRe = /^\d{1,2}[.\/]\d{1,2}$/;
    const dailyRows = rows.filter(r => dateRe.test((r[COL.date]||'').trim()));
    const filledRows = dailyRows.filter(r => (r[COL.revenue]||'').trim() !== '');

    const totalRevenue = filledRows.reduce((s,r)=> s + (parseNum(r[COL.revenue])||0), 0);
    const totalChecks = filledRows.reduce((s,r)=> s + (parseNum(r[COL.checks])||0), 0);
    const totalPlan1Rev = filledRows.reduce((s,r)=> s + (parseNum(r[COL.plan1Rev])||0), 0);
    const avgCheck = totalChecks>0 ? totalRevenue/totalChecks : avg(filledRows.map(r=>parseNum(r[COL.avgCheck])));
    const avgSPP = avg(filledRows.map(r=>parseNum(r[COL.spp])));
    const avgPassengers = avg(filledRows.map(r=>parseNum(r[COL.passengers])));
    const percentPlan1 = totalPlan1Rev>0 ? (totalRevenue/totalPlan1Rev*100) : null;
    const lastFilledDate = filledRows.length ? filledRows[filledRows.length-1][COL.date] : null;

    const debug = { totalRows: rows.length, dailyCount: dailyRows.length, filledCount0: filledRows.length, sampleDaily: dailyRows.slice(0,3) };

    return { totalRevenue, totalChecks, avgCheck, avgSPP, avgPassengers, plan1Rate:33, percentPlan1, lastFilledDate, filledCount: filledRows.length, fetchedAt: new Date(), debug };
  }

  const progressFill = document.getElementById('ob-progress-fill');

  let statusMap = {}; // sectionId -> 'todo' | 'wip' | 'ok'
  let activeId = SECTIONS[0].id;

  async function loadStatuses(){
    try{
      const res = await window.storage.get('opbook:statuses', true);
      statusMap = res ? JSON.parse(res.value) : {};
    }catch(e){ statusMap = {}; }
    SECTIONS.forEach(s=>{ if(!statusMap[s.id]) statusMap[s.id]='todo'; });
    renderNav();
    updateProgress();
  }

  async function saveStatuses(){
    try{ await window.storage.set('opbook:statuses', JSON.stringify(statusMap), true); }catch(e){}
  }

  function updateProgress(){
    const done = SECTIONS.filter(s=>statusMap[s.id]==='ok').length;
    progressText.textContent = done + '/' + SECTIONS.length;
    progressFill.style.width = Math.round(done/SECTIONS.length*100) + '%';
  }

  function renderNav(){
    nav.innerHTML = '';
    let lastGroup = null;
    SECTIONS.forEach(s=>{
      if(s.group !== lastGroup){
        const label = document.createElement('div');
        label.className = 'ob-nav-group-label';
        label.textContent = s.group==='point' ? ('Точка: ' + POINT_LABEL[currentPoint]) : 'Общее для обеих точек';
        nav.appendChild(label);
        lastGroup = s.group;
      }
      const btn = document.createElement('button');
      btn.className = 'ob-nav-item' + (s.id===activeId ? ' active':'');
      btn.innerHTML = `<span class="ob-nav-code ob-mono">${s.code}</span><span class="ob-nav-icon">${s.icon}</span><span class="ob-nav-name">${s.name}</span><span class="ob-dot ${statusMap[s.id]||'todo'}"></span>`;
      btn.onclick = ()=> selectSection(s.id);
      nav.appendChild(btn);
    });
  }

  function flipFlap(code){
    const chars = '0123456789'.split('');
    let ticks = 0;
    const maxTicks = 6;
    const interval = setInterval(()=>{
      flapEl.textContent = chars[Math.floor(Math.random()*chars.length)] + chars[Math.floor(Math.random()*chars.length)];
      ticks++;
      if(ticks>=maxTicks){ clearInterval(interval); flapEl.textContent = code; }
    }, 40);
  }

  function accentClass(s){
    if(s.accent==='point') return currentPoint==='bh' ? 'accent-bh' : 'accent-mobar';
    return s.accent||'';

  function selectSection(id){
    activeId = id;
    const s = SECTIONS.find(x=>x.id===id);
    mainEl.className = 'ob-main ' + accentClass(s);
    boardTitle.textContent = s.group==='point' ? ('Раздел · ' + POINT_LABEL[currentPoint]) : 'Раздел · общее для BH и Мо Бар';
    boardName.textContent = s.icon + '  ' + s.name;
    flipFlap(s.code);
    renderNav();
    renderStatusHeader(s);
    contentEl.querySelectorAll('.ob-dynamic').forEach(n=>n.remove());

  function openStoryViewer(photos){
    if(!photos.length) return;
    let idx = 0;
    const overlayRoot = document.getElementById('ob-story-overlay');

    function render(){
      overlayRoot.innerHTML = `
        <div class="ob-story-overlay" id="ob-story-backdrop">
          <div class="ob-story-frame">
            <button class="ob-story-close" id="ob-story-close">✕</button>
            <img src="${photos[idx].src}" />
            <div class="ob-story-caption">${photos[idx].caption||''}</div>
            <div class="ob-story-nav">
              <button class="ob-story-navbtn" id="ob-story-prev" ${idx===0?'disabled':''}>‹</button>
              <div class="ob-story-dots">${photos.map((_,i)=>`<div class="ob-story-dot ${i===idx?'active':''}"></div>`).join('')}</div>
              <button class="ob-story-navbtn" id="ob-story-next" ${idx===photos.length-1?'disabled':''}>›</button>
            </div>
          </div>
        </div>`;
      document.getElementById('ob-story-close').onclick = close;
      document.getElementById('ob-story-prev').onclick = ()=> go(idx-1);
      document.getElementById('ob-story-next').onclick = ()=> go(idx+1);
      document.getElementById('ob-story-backdrop').onclick = (e)=>{ if(e.target.id==='ob-story-backdrop') close(); };
    }
    function go(n){
      if(n < 0 || n >= photos.length) return;
      idx = n;
      render();
    }
    function close(){ overlayRoot.innerHTML=''; }
    render();
  }

  function renderChecklist(){
    const body = document.getElementById('ob-body');
    const roles = CHECKLISTS[currentPoint];
    const wrap = document.createElement('div');
    wrap.className='ob-dynamic';
    wrap.innerHTML = roles.map((r,ri)=>`
      <details class="ob-card" style="padding:10px 18px;" ${ri===0?'open':''}>
        <summary style="cursor:pointer;font-weight:600;font-size:13px;padding:6px 0;">${r.role}</summary>
        <div style="margin-top:6px;" data-role="${ri}"></div>
      </details>`).join('');
    body.appendChild(wrap);

    roles.forEach((r, ri)=>{
      const roleEl = wrap.querySelector(`[data-role="${ri}"]`);
      r.sections.forEach(async (sec, si)=>{
        const key = `opbook:checklist:${currentPoint}:${ri}:${si}`;
        let saved = {};
        try{ const res = await window.storage.get(key, true); saved = res ? JSON.parse(res.value) : {}; }catch(e){ saved = {}; }
        const secEl = document.createElement('div');
        secEl.style.cssText='margin-bottom:10px;';
        secEl.innerHTML = `<p style="font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:#8a8a80;margin:8px 0 4px;">${sec.title}</p>` +
          sec.items.map((t,i)=>`
            <div class="ob-check-row ${saved[i]?'done':''}" data-i="${i}" style="padding:6px 0;">
              <input type="checkbox" id="${key}-${i}" ${saved[i]?'checked':''}/>
              <label for="${key}-${i}" style="font-size:13px;">${t}</label>
            </div>`).join('');
        roleEl.appendChild(secEl);
        secEl.querySelectorAll('input[type=checkbox]').forEach(inp=>{
          inp.addEventListener('change', async (e)=>{
            const i = e.target.closest('.ob-check-row').dataset.i;
            saved[i] = e.target.checked;
            e.target.closest('.ob-check-row').classList.toggle('done', e.target.checked);
            try{ await window.storage.set(key, JSON.stringify(saved), true); }catch(err){}
          });
        });
      });
    });
  }

  function normStatus(s){
    s = (s||'').trim();
    if(!s) return '—';
    if(/не\s*оформлен/i.test(s)) return '❌ Не оформлен';
    if(/оформлен/i.test(s)) return '✅ Оформлен';
    return s;
  }

  const TEAM_SHEET_CANDIDATES = {
    mobar: ['Мо - Бар', 'Мо -Бар', 'Мо- Бар', 'Мо-Бар', 'Мо - Бар '],
    bh: ['БХ', 'БХ ', ' БХ', 'Бх', 'БХ VKO', 'Burger Heroes'],

  function looksLikeValidTeamRows(rows){
    return rows.some(r => r.join(' ').match(/оформлен/i)) &&
           rows.some(r => /^\d+$/.test((r[0]||'').trim()));
  }

  async function loadTeamData(point){
    const col = TEAM_COLS[point];
    const candidates = TEAM_SHEET_CANDIDATES[point];
    let rows = null, lastErr = null, usedName = null;
    for(const name of candidates){
      try{
        const json = await fetchSheetJSONP(TEAM_SHEET_ID, name);
        if(json.status === 'error'){ lastErr = new Error((json.errors&&json.errors[0]&&json.errors[0].detailed_message)||'Sheets error'); continue; }
        const r = jsonToRows(json);
        if(looksLikeValidTeamRows(r)){ rows = r; usedName = name; break; }
        lastErr = new Error('Лист «'+name+'» найден, но не похож на список сотрудников');
      }catch(e){ lastErr = e; }
    }
    if(!rows) throw (lastErr || new Error('Не нашли подходящий лист'));

    const list = [];
    rows.forEach(row=>{
      const num = (row[col.num]||'').trim();
      const name = (row[col.name]||'').trim();
      if(!/^\d+$/.test(num)) return;
      if(!name || name.length < 3 || /^(бх|рф|мо\s*бар)$/i.test(name)) return;
      list.push({
        name,
        role: (row[col.role]||'').trim() || '—',
        phone: (row[col.phone]||'').trim() || '—',
        status: normStatus(row[col.status]),
      });
    });
    return { list, debug: { usedSheetName: usedName, totalRows: rows.length, sample: rows.slice(0,8) } };
  }

  async function renderFinance(){
    const body = document.getElementById('ob-body');
    body.innerHTML = '';
    const point = currentPoint;
    const wrap = document.createElement('div');
    wrap.className='ob-dynamic';
    wrap.innerHTML = `<div class="ob-card"><p class="ob-card-title">Загрузка...</p><p style="font-size:13px;color:#555;margin:0;">Тяну данные из таблицы «${REVENUE_SHEET_NAMES[point]}»...</p></div>`;
    body.appendChild(wrap);

    function planColor(pct){
      if(pct===null) return '#555';
      return pct>=100 ? '#1f6b30' : pct>=85 ? '#8a6900' : '#a13a17';
    }

    function paint(data, errMsg, fromCache){
      if(currentPoint !== point || activeId !== 'finance') return;
      if(errMsg){
        wrap.innerHTML = `
          <div class="ob-card">
            <p class="ob-card-title">Не удалось подтянуть данные</p>
            <p style="font-size:13px;color:#555;margin:0 0 6px;">Причина: <span class="ob-mono">${errMsg}</span></p>
            <p style="font-size:13px;color:#555;margin:0 0 8px;">Загрузка идёт через служебный запрос Google Sheets по названию листа «${REVENUE_SHEET_NAMES[point]}». Если название листа менялось — обнови его в коде книги. Если доступ «Все, у кого есть ссылка» вдруг слетел — проверь его в исходном файле.</p>
            <p style="font-size:13px;margin:0;"><a href="https://docs.google.com/spreadsheets/d/${REVENUE_SHEET_ID}/edit" target="_blank" style="color:${point==='bh'?'#a13a17':'var(--mobar-2)'};font-weight:700;">👉 Открыть таблицу вручную</a></p>
            <button id="ob-fin-retry" style="margin-top:10px;font-size:12px;padding:6px 12px;border-radius:6px;border:1px solid rgba(0,0,0,0.15);background:#fff;cursor:pointer;">↻ Повторить</button>
          </div>`;
        document.getElementById('ob-fin-retry').onclick = ()=>{ delete financeCache[point]; renderFinance(); };
        return;
      }
      const time = data.fetchedAt.toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit'});
      const pct = data.percentPlan1;
      wrap.innerHTML = `
        <div class="ob-card">
          <p class="ob-card-title">Live · ${REVENUE_SHEET_NAMES[point]} <span style="text-transform:none;color:#aaa;">· обновлено ${time}${fromCache?' (кэш)':''}${data.lastFilledDate?(' · данные по ' + data.lastFilledDate):''}</span></p>
          <p style="font-size:13px;margin:0;"><a href="https://docs.google.com/spreadsheets/d/${REVENUE_SHEET_ID}/edit" target="_blank" style="color:${point==='bh'?'#a13a17':'var(--mobar-2)'};font-weight:700;">👉 Открыть таблицу</a>
          &nbsp;·&nbsp; <button id="ob-fin-refresh" style="font-size:12px;padding:3px 10px;border-radius:12px;border:1px solid rgba(0,0,0,0.15);background:#fff;cursor:pointer;">↻ Обновить</button></p>
        </div>
        <div class="ob-stat-row">
          <div class="ob-stat"><div class="ob-stat-val">${fmtNum(data.totalRevenue)}</div><div class="ob-stat-label">Выручка за месяц</div></div>
          <div class="ob-stat"><div class="ob-stat-val">${fmtNum(data.avgSPP,1)}</div><div class="ob-stat-label">Средний СПП, ₽/пасс</div></div>
          <div class="ob-stat"><div class="ob-stat-val">${fmtNum(data.avgPassengers)}</div><div class="ob-stat-label">Средний пассажиропоток</div></div>
        </div>
        <div class="ob-stat-row">
          <div class="ob-stat"><div class="ob-stat-val">${fmtNum(data.avgCheck)}</div><div class="ob-stat-label">Средний чек</div></div>
          <div class="ob-stat"><div class="ob-stat-val" style="color:${planColor(pct)}">${pct!==null?fmtNum(pct,0)+'%':'—'}</div><div class="ob-stat-label">Выполнение Плана 1${data.plan1Rate?(' ('+data.plan1Rate+'₽/пасс)'):''}</div></div>
        </div>
        ${data.filledCount===0?'<p style="font-size:12px;color:#8a8a80;">За этот месяц ещё нет заполненных дней в таблице.</p>':''}
        <details style="margin-top:14px;font-size:11px;color:#777;">
          <summary style="cursor:pointer;font-weight:600;">🔧 Диагностика (временно, чтобы найти проблему)</summary>
          <div class="ob-mono" style="white-space:pre-wrap;background:#111;color:#9f9;padding:10px;border-radius:6px;margin-top:6px;font-size:10px;line-height:1.5;overflow-x:auto;">${escapeHtml(JSON.stringify(data.debug, null, 2))}</div>
        </details>`;
      document.getElementById('ob-fin-refresh').onclick = ()=>{ delete financeCache[point]; renderFinance(); };
    }

    if(financeCache[point] && financeCache[point] !== 'error'){ paint(financeCache[point], null, true); }
    try{
      const data = await loadFinanceData(point);
      financeCache[point] = data;
      paint(data, null, false);
    }catch(e){
      if(!financeCache[point]) paint(null, e.message || String(e), false);
    }
  }

        <p style="font-size:13px;color:#555;margin:0 0 8px;">Полезно понимать, чего ждут задержанные гости — за это отвечают авиакомпании, но вопросы часто идут на месте, в том числе к вам:</p>
        <div class="ob-check-row" style="border-bottom:1px solid rgba(0,0,0,0.06);"><span style="flex:1;">Ожидание вылета &gt; 4 часов</span><span style="font-size:12px;color:#777;">вода + горячее питание, далее каждые 6ч (день) / 8ч (ночь)</span></div>
        <div class="ob-check-row"><span style="flex:1;">Ожидание &gt; 8ч день / &gt; 6ч ночь</span><span style="font-size:12px;color:#777;">размещение в гостинице</span></div>
      </div>

      <div class="ob-card">
        <p class="ob-card-title">Гости с приоритетом</p>
        <p style="font-size:13px;color:#555;margin:0;">Группы детей и пассажиры с детьми, маломобильные пассажиры, военнослужащие/участники СВО обслуживаются в приоритетном порядке и могут направляться в отдельные зоны ожидания. Если такие гости обращаются на точке — по возможности идём навстречу в первую очередь.</p>
      </div>

      <div class="ob-card">
        <p class="ob-card-title">Кто главный на площадке во время сбоя</p>
        <p style="font-size:13px;color:#555;margin:0;">Директор аэропорта (сменный) — ДА(с) — отвечает за организацию и координацию. Официальные ограничения (например, по алкоголю) идут по цепочке от дирекции аэропорта, а не от случайных людей на месте. Если кто-то представляется «от Штаба» без подтверждения на бумаге/почте — уточни у управляющего или операционного, прежде чем что-либо менять в работе точки.</p>
        <p style="font-size:13px;color:#555;margin:10px 0 0;">Таможня, погранконтроль (ФСБ), полиция аэропорта — вызываются только через ДА(с)/СБ, не самостоятельно. Прямых поводов звонить туда с точки быть не должно — эскалация идёт по цепочке: СБ (Дмитрий Маркин) → управляющий → операционный управляющий.</p>
      </div>

      <p style="font-size:11px;color:#8a8a80;">Источник: РГ-02.06-12 «Регламент взаимодействия подразделений в условиях сбойных ситуаций», издание 2, АО «Международный аэропорт «Внуково». Полный документ и его актуальность — <a href="https://portal.vnukovo.ru" target="_blank" style="color:inherit;">portal.vnukovo.ru</a> (для работников) или <a href="https://partner.vnukovo.ru" target="_blank" style="color:inherit;">partner.vnukovo.ru</a> (для партнёров). Здесь — только выжимка, актуальная для управляющего и команды точки, а не весь регламент (он в первую очередь про работу диспетчерских служб и авиакомпаний).</p>`;
    body.appendChild(wrap);
  }

  async function renderManagerTasks(){
    const body = document.getElementById('ob-body');
    const daily = ["Проверить выручку за предыдущий день до 12:00","Мониторинг отзывов (Яндекс, Google, 2GIS)","Проверить список депремирований (СБ)","Обойти точку, проверить стандарты","Заполнить дневной отчёт управляющего"];
    const weekly = ["Записать задачи от босса (каждую субботу)","Проверить эффективность кассиров (Пн)","Отправить бланк заказа Мо Бар в группу (Пн до 14:00)","Провести собрание с командой 5-10 мин (Пн утро)","Проверить актуальность графика персонала (Пт)"];
    const monthly = ["Заполнить табель сотрудников (до 2 числа)","Заполнить эффективность кассиров (до 2 числа)","Проверить/обновить медкнижки (1 число)","Сверить список отпусков (1 число)","Подвести итоги конкурса кассиров","Проверить сроки годности формы персонала","Обновить данные по поставщикам при изменениях"];

    async function buildCard(title, items, key){
      let saved = {};
      try{ const res = await window.storage.get(key, true); saved = res ? JSON.parse(res.value) : {}; }catch(e){ saved = {}; }
      const card = document.createElement('div');
      card.className='ob-card ob-dynamic';
      card.innerHTML = `<p class="ob-card-title">${title}</p>` + items.map((t,i)=>`
        <div class="ob-check-row ${saved[i]?'done':''}" data-i="${i}">
          <input type="checkbox" id="${key}-${i}" ${saved[i]?'checked':''}/>
          <label for="${key}-${i}">${t}</label>
        </div>`).join('');
      body.appendChild(card);
      card.querySelectorAll('input[type=checkbox]').forEach(inp=>{
        inp.addEventListener('change', async (e)=>{
          const i = e.target.closest('.ob-check-row').dataset.i;
          saved[i] = e.target.checked;
          e.target.closest('.ob-check-row').classList.toggle('done', e.target.checked);
          try{ await window.storage.set(key, JSON.stringify(saved), true); }catch(err){}
        });
      });
    }
    await buildCard('📅 Ежедневно', daily, 'opbook:mgr:daily');
    await buildCard('📅 Еженедельно', weekly, 'opbook:mgr:weekly');
    await buildCard('📅 Ежемесячно', monthly, 'opbook:mgr:monthly');
  }
